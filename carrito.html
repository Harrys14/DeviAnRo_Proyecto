<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:#f8f9fa;
}

.container{
    width:100%;
    max-width:1300px;
    margin:auto;
    padding:30px;
}

h1{
    color:#E53935;
    margin-bottom:30px;
    font-size:40px;
}

.cart-item{
    background:white;
    border-radius:20px;
    padding:20px;
    display:flex;
    gap:20px;
    align-items:center;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.cart-item img{
    width:150px;
    height:150px;
    object-fit:cover;
    border-radius:15px;
}

.item-info{
    flex:1;
}

.item-info h2{
    margin-bottom:10px;
}

.price{
    color:#E53935;
    font-size:28px;
    font-weight:bold;
    margin:15px 0;
}

.quantity{
    display:flex;
    align-items:center;
    gap:12px;
}

.quantity button{
    width:35px;
    height:35px;
    border:none;
    background:#E53935;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

.total-box{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    margin-top:30px;
}

.total{
    font-size:40px;
    color:#E53935;
    font-weight:bold;
    margin:15px 0;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    font-size:17px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}

.btn-primary{
    background:#E53935;
    color:white;
}

.btn-secondary{
    background:#666;
    color:white;
}

.empty{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.recommendations{

    margin-top:40px;
}

.recommend-grid{

    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

.recommend{

    background:white;
    border-radius:20px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.recommend img{

    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:15px;
}

.recommend h3{

    margin:15px 0 10px;
}

@media(max-width:768px){

    .container{

        padding:18px;
    }

    .cart-item{

        flex-direction:column;
        align-items:flex-start;
    }

    .cart-item img{

        width:100%;
        height:220px;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>🛒 Carrito</h1>

<div id="cartContainer"></div>

</div>

<script>

let carrito = JSON.parse(
    localStorage.getItem("carrito")
) || [];

const cartContainer =
    document.getElementById("cartContainer");

function formato(valor){

    return "$" + valor.toLocaleString("es-CO");
}

function renderCarrito(){

    cartContainer.innerHTML = "";

    if(carrito.length === 0){

        cartContainer.innerHTML = `

       <div class="empty">

    <h2>No tienes nada en tu carrito 😢</h2>

    <p style="margin-top:10px;">
        Agrega productos para empezar tu pedido
    </p>

    <button 
        class="btn btn-primary"
        style="max-width:300px; margin-top:25px;"
        onclick="window.location.href='home.html'"
    >

        ← Volver al inicio

    </button>

</div>
        `;

        return;
    }

    let total = 0;

    carrito.forEach((producto, index)=>{

        const subtotal =
            parseInt(
                producto.precio.replace(/\D/g,'')
            ) * producto.cantidad;

        total += subtotal;

        cartContainer.innerHTML += `

        <div class="cart-item">

            <img src="${producto.imagen}">

            <div class="item-info">

                <h2>${producto.nombre}</h2>

                <p>${producto.descripcion}</p>

                <div class="price">

                    ${formato(subtotal)}

                </div>

                <div class="quantity">

                    <button onclick="cambiarCantidad(${index}, -1)">
                        -
                    </button>

                    <span>${producto.cantidad}</span>

                    <button onclick="cambiarCantidad(${index}, 1)">
                        +
                    </button>

                </div>

            </div>

        </div>
        `;
    });

    cartContainer.innerHTML += `

    <div class="total-box">

        <h2>Total</h2>

        <div class="total">

            ${formato(total)}

        </div>

        <button 
            class="btn btn-primary"
            onclick="confirmarPedido()"
        >

            Confirmar Pedido

        </button>

        <button 
            class="btn btn-secondary"
            onclick="window.location.href='home.html'"
        >

            Seguir comprando

        </button>

    </div>
    `;
}

function cambiarCantidad(index, cambio){

    carrito[index].cantidad += cambio;

    if(carrito[index].cantidad <= 0){

        carrito.splice(index,1);
    }

    localStorage.setItem(
        "carrito",
        JSON.stringify(carrito)
    );

    renderCarrito();
}

function confirmarPedido(){

    alert("¡Pedido confirmado!");

    localStorage.removeItem("carrito");

    carrito = [];

    renderCarrito();
}

renderCarrito();

</script>

</body>
</html>
