<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeviAnRo - Cuenta</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', Arial, sans-serif;
            background:#f8f9fa;
        }

        /* ===== CONTENEDOR ===== */

        .container{

            width:100%;
            max-width:1400px;
            margin:auto;
            padding:30px;
        }

        /* ===== HEADER ===== */

        .top-header{

            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:35px;
        }

        .logo{

            color:#E53935;
            font-size:42px;
            font-weight:bold;
        }

        .header-right{

            display:flex;
            align-items:center;
            gap:15px;
        }

        .location{

            background:#E53935;
            color:white;
            padding:10px 20px;
            border-radius:30px;
            font-size:15px;
        }

        /* ===== MENU ===== */

        .menu-container{

            position:relative;
        }

        .menu-btn{

            background:#E53935;
            color:white;
            border:none;
            width:45px;
            height:45px;
            border-radius:12px;
            font-size:24px;
            cursor:pointer;
        }

        .menu-dropdown{

            position:absolute;
            top:55px;
            right:0;
            background:white;
            width:220px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
            display:none;
            overflow:hidden;
            z-index:999;
        }

        .menu-dropdown a{

            display:block;
            padding:16px 20px;
            color:#333;
            text-decoration:none;
        }

        .menu-dropdown a:hover{

            background:#f5f5f5;
        }

        /* ===== PERFIL ===== */

        .profile-card{

            background:white;
            border-radius:25px;
            padding:40px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
            margin-bottom:30px;
            text-align:center;
        }

        .avatar{

            width:120px;
            height:120px;
            background:#E53935;
            color:white;
            font-size:50px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0 auto 20px;
        }

        .profile-card h1{

            color:#E53935;
            font-size:36px;
            margin-bottom:10px;
        }

        .email{

            color:#666;
            font-size:18px;
        }

        /* ===== OPCIONES ===== */

        .menu-grid{

            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap:20px;
        }

        .menu-item{

            background:white;
            padding:25px;
            border-radius:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
            font-size:20px;
            cursor:pointer;
            transition:0.3s;
        }

        .menu-item:hover{

            transform:translateY(-5px);
            background:#fff3f3;
        }

        /* ===== RESPONSIVE ===== */

        @media (max-width:768px){

            .container{

                padding:18px;
            }

            .top-header{

                flex-direction:column;
                align-items:flex-start;
                gap:15px;
            }

            .header-right{

                width:100%;
                justify-content:space-between;
            }

            .logo{

                font-size:32px;
            }

            .profile-card{

                padding:25px;
            }

            .profile-card h1{

                font-size:28px;
            }

            .avatar{

                width:100px;
                height:100px;
                font-size:42px;
            }

            .menu-item{

                font-size:18px;
                padding:20px;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <!-- HEADER -->

    <header class="top-header">

        <div class="logo">
            DeviAnRo
        </div>

        <div class="header-right">

            <div class="location">
                Bogotá
            </div>

            <div class="menu-container">

                <button class="menu-btn" onclick="toggleMenu()">
                    ⋮
                </button>

                <div class="menu-dropdown" id="menuDropdown">

                    <a href="home.html">
                        🏠 Home
                    </a>

                    <a href="carrito.html">
                        🛒 Carrito
                    </a>

                    <a href="cuenta.html">
                        👤 Cuenta
                    </a>

                </div>

            </div>

        </div>

    </header>

    <!-- PERFIL -->

    <div class="profile-card">

        <div class="avatar">
            👤
        </div>

        <h1>
            Harryson
        </h1>

        <p class="email">
            harryson@ejemplo.com
        </p>

    </div>

    <!-- OPCIONES -->

    <div class="menu-grid">

        <div class="menu-item" onclick="alert('Opción en desarrollo')">
            📍 Mis direcciones
        </div>

        <div class="menu-item" onclick="alert('Opción en desarrollo')">
            📜 Mis pedidos
        </div>

        <div class="menu-item" onclick="alert('Opción en desarrollo')">
            ❤️ Favoritos
        </div>

        <div class="menu-item" onclick="alert('Opción en desarrollo')">
            ⚙️ Configuración
        </div>

        <div 
            class="menu-item"
            onclick="window.location.href='index.html'"
        >
            🚪 Cerrar sesión
        </div>

    </div>

</div>

<script>

/* ===== MENU ===== */

function toggleMenu(){

    const menu = document.getElementById("menuDropdown");

    if(menu.style.display === "block"){

        menu.style.display = "none";

    }else{

        menu.style.display = "block";
    }
}

window.onclick = function(e){

    if(!e.target.matches('.menu-btn')){

        const menu = document.getElementById("menuDropdown");

        if(menu.style.display === "block"){

            menu.style.display = "none";
        }
    }
}

</script>

</body>
</html>
