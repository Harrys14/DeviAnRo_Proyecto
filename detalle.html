<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeviAnRo - Detalle</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', Arial, sans-serif;
            background:#f8f9fa;
        }

        .container{

            width:100%;
            max-width:1200px;
            margin:auto;
            padding:30px;
        }

        .detail-grid{

            display:grid;
            grid-template-columns:1fr 1fr;
            gap:40px;
            align-items:center;
        }

        .product-image{

            width:100%;
            height:500px;
            object-fit:cover;
            border-radius:25px;
        }

        .info{

            background:white;
            padding:35px;
            border-radius:25px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        h1{

            color:#E53935;
            font-size:42px;
            margin-bottom:10px;
        }

        .price{

            font-size:38px;
            font-weight:bold;
            color:#E53935;
            margin-bottom:20px;
        }

        .description{

            color:#555;
            line-height:1.7;
            margin-bottom:25px;
        }

        .ingredients{

            background:#fff5f5;
            padding:20px;
            border-radius:15px;
            margin-bottom:25px;
        }

        .ingredients h3{

            margin-bottom:10px;
            color:#E53935;
        }

        .btn-group{

            display:flex;
            gap:15px;
        }

        .btn{

            flex:1;
            padding:16px;
            border:none;
            border-radius:12px;
            font-size:17px;
            cursor:pointer;
            font-weight:bold;
        }

        .btn-primary{

            background:#E53935;
            color:white;
        }

        .btn-secondary{

            background:#666;
            color:white;
        }

        .btn:hover{

            opacity:0.9;
        }

        @media (max-width:768px){

            .container{

                padding:18px;
            }

            .detail-grid{

                grid-template-columns:1fr;
            }

            .product-image{

                height:300px;
            }

            h1{

                font-size:30px;
            }

            .price{

                font-size:28px;
            }

            .btn-group{

                flex-direction:column;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <div class="detail-grid">

        <img 
            id="productImage"
            class="product-image"
            src="img/hamburguesa.jpg"
        >

        <div class="info">

            <h1 id="productName">
                Hamburguesa Clásica
            </h1>

            <div class="price" id="productPrice">
                $13.900
            </div>

            <div class="description">

                <h3>Descripción</h3>

                <p id="productDesc">
                    Deliciosa hamburguesa artesanal.
                </p>

            </div>

            <div class="ingredients">

                <h3>Ingredientes</h3>

                <p id="productIngredientes"></p>

            </div>

            <div class="btn-group">

                <button 
                    class="btn btn-secondary"
                    onclick="window.history.back()"
                >

                    Volver

                </button>

                <button 
                    class="btn btn-primary"
                    onclick="agregarAlCarrito()"
                >

                    Agregar al carrito

                </button>

            </div>

        </div>

    </div>

</div>

<script>

const producto = JSON.parse(
    localStorage.getItem("productoSeleccionado")
);

if(producto){

    document.getElementById("productName").textContent =
        producto.nombre;

    document.getElementById("productPrice").textContent =
        producto.precio;

    document.getElementById("productDesc").textContent =
        producto.descripcion;

    document.getElementById("productImage").src =
        producto.imagen;

    document.getElementById("productIngredientes").textContent =
        producto.ingredientes;
}

/* ===== AGREGAR AL CARRITO ===== */

function agregarAlCarrito(){

    let carrito = JSON.parse(
        localStorage.getItem("carrito")
    ) || [];

    const existe = carrito.find(
        item => item.nombre === producto.nombre
    );

    if(existe){

        existe.cantidad++;

    }else{

        carrito.push({

            ...producto,
            cantidad:1

        });
    }

    localStorage.setItem(
        "carrito",
        JSON.stringify(carrito)
    );

    alert("Producto agregado al carrito");

    window.location.href = "carrito.html";
}

</script>

</body>
</html>
