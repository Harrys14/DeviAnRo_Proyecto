<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Delivery - Registro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; }
        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        h1 { color: #E53935; text-align: center; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #E53935;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registro</h1>
        <input type="text" placeholder="Nombre completo">
        <input type="email" placeholder="Correo electrónico">
        <input type="password" placeholder="Contraseña">
        <input type="password" placeholder="Confirmar contraseña">
        <button class="btn-primary" onclick="window.location.href='home.html'">Registrarse</button>
        <p style="text-align:center; margin-top:20px;">
            ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
        </p>
    </div>
</body>
</html>
