<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Delivery - Registro</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', Arial, sans-serif;
            background:linear-gradient(135deg,#fff5f5,#f8f9fa);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .container{

            width:100%;
            max-width:500px;
            background:white;
            padding:40px;
            border-radius:25px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .logo{

            text-align:center;
            color:#E53935;
            font-size:42px;
            margin-bottom:10px;
            font-weight:bold;
        }

        .subtitle{

            text-align:center;
            color:#666;
            margin-bottom:35px;
            font-size:16px;
        }

        .input-group{

            margin-bottom:18px;
        }

        .input-group label{

            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#444;
        }

        input{

            width:100%;
            padding:15px;
            border:2px solid #eee;
            border-radius:12px;
            font-size:16px;
            transition:0.3s;
        }

        input:focus{

            outline:none;
            border-color:#E53935;
        }

        .btn-primary{

            width:100%;
            padding:16px;
            background:#E53935;
            color:white;
            border:none;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            margin-top:10px;
            transition:0.3s;
        }

        .btn-primary:hover{

            background:#c62828;
        }

        .login-link{

            text-align:center;
            margin-top:25px;
            color:#666;
        }

        .login-link a{

            color:#E53935;
            font-weight:bold;
            text-decoration:none;
        }

        @media (max-width:600px){

            body{

                padding:20px;
            }

            .container{

                padding:30px 22px;
            }

            .logo{

                font-size:34px;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <div class="logo">
            App Delivery
        </div>

        <div class="subtitle">
            Crea tu cuenta para empezar a ordenar 🍔
        </div>

        <div class="input-group">

            <label>Nombre completo</label>

            <input 
                type="text"
                placeholder="Ingresa tu nombre"
            >

        </div>

        <div class="input-group">

            <label>Correo electrónico</label>

            <input 
                type="email"
                placeholder="ejemplo@correo.com"
            >

        </div>

        <div class="input-group">

            <label>Contraseña</label>

            <input 
                type="password"
                placeholder="••••••••"
            >

        </div>

        <div class="input-group">

            <label>Confirmar contraseña</label>

            <input 
                type="password"
                placeholder="••••••••"
            >

        </div>

        <button 
            class="btn-primary"
            onclick="window.location.href='home.html'"
        >

            Registrarse

        </button>

        <div class="login-link">

            ¿Ya tienes cuenta? 

            <a href="index.html">
                Inicia sesión
            </a>

        </div>

    </div>

</body>
</html>
